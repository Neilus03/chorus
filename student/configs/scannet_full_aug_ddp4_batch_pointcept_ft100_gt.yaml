# Finetune: start from pseudo-trained student weights, train on real ScanNet GT for 100 epochs.
# Launch (DDP 4xGPU): torchrun --standalone --nproc_per_node=4 scripts/run_multi_scene.py --config configs/scannet_full_aug_ddp4_batch_pointcept_ft100_gt.yaml --finetune-from /path/to/best.pt

experiment:
  name: scannet_full_aug_ddp4_batched_pointcept_ft100_gt
  seed: 42
  output_root: ${CHORUS_OUTPUT_ROOT:-/scratch2/nedela/student_runs}

data:
  scans_root: ${SCANNET_SCANS_ROOT:-/scratch2/nedela/chorus_poc/scans}
  train_split: configs/splits/scannet_full_train.txt
  val_split: configs/splits/scannet_full_val.txt
  granularities: [0.2, 0.5, 0.8]
  use_colors: true
  use_normals: true
  append_xyz_to_features: true
  min_instance_points: 10
  preload: false
  max_points: 70000
  subsampling_mode: sphere_crop
  augmentations: true
  dense_instance_ids: false
  # Switch training supervision from pack pseudo labels to real ScanNet GT instance ids.
  # GT is replicated to all three heads (g02/g05/g08).
  label_source: scannet_gt

model:
  backbone:
    name: litept
    litept_root: ${LITEPT_ROOT:-/home/nedela/projects/LitePT}
    litept_variant: litept_s_star
    in_channels: 9
    grid_size: 0.02
    multi_scale: true
    multi_scale_indices: [0, 1, 2, 3]
  num_queries: 200
  num_queries_by_granularity:
    g02: 300
    g05: 200
    g08: 100
  decoder_hidden_dim: 256
  num_decoder_layers: 4
  num_decoder_heads: 8
  query_init: hybrid
  use_positional_guidance: true
  learned_query_ratio: 0.25

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  score_weight: 0.5
  aux_weight: 0.2

train:
  device: cuda
  # Finetune defaults (lower LR, shorter warmup, frequent eval)
  lr: 1.0e-4
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  max_epochs: 100
  eval_every_epochs: 5
  save_every_epochs: 10
  log_every_steps: 50
  warmup_epochs: 5
  num_workers: 2
  batch_scenes_per_step: 2
  balance_train_by_points: true
  drop_last_train: false
  sync_step_metrics: false
  log_scene_ids: false
  profile_train_steps: false
  profile_every_steps: 10
  max_total_points_per_batch: null
  batch_assembly_policy: sequential
  decoder_loss_mode: scene_local

eval:
  # Used both for training-time evaluation and to decide which GT instances are supervised/kept.
  scannet_benchmark: all
  score_threshold: 0.1
  mask_threshold: 0.5
  min_points_per_proposal: 30
  fragment_merge_eval: false
