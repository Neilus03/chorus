# Older single-GPU 100/10 preset. For DDP-4 + batched scenes + Pointcept-style sphere crops use:
#   configs/scannet_train100_val10_aug_ddp4_batched_pointcept.yaml

experiment:
  name: multi_scene_100_10
  seed: 42
  output_root: /scratch2/nedela/student_runs

data:
  scans_root: /scratch2/nedela/chorus_poc/scans
  train_split: configs/splits/train_100.txt
  val_split: configs/splits/val_10.txt
  # train_100.txt: 100 scenes with training_pack (val_3 excluded). Epoch = 100 steps.
  granularities: [0.2, 0.5, 0.8]
  use_colors: true
  append_xyz_to_features: false
  min_instance_points: 10
  preload: true
  # Cap points per scene (random subsample each __getitem__) so decoder fits in ~24GB VRAM.
  # Full scenes in this split reach ~370k points; cross-attention memory scales with size.
  max_points: 130000

model:
  backbone:
    name: litept
    litept_root: /home/nedela/projects/LitePT
    litept_variant: litept_s_star
    in_channels: 3
    grid_size: 0.02
    multi_scale: false
    num_queries: 200
    num_queries_by_granularity:
      g02: 300
      g05: 200
      g08: 100
  decoder_hidden_dim: 256
  num_decoder_layers: 3
  num_decoder_heads: 8
  query_init: learned
  use_positional_guidance: true
  learned_query_ratio: 0.5

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  score_weight: 0.5
  aux_weight: 0.2

train:
  device: cuda:0
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip_norm: 1.0
  max_epochs: 1500
  eval_every_epochs: 5
  save_every_epochs: 10
  log_every_steps: 1
  warmup_epochs: 20

eval:
  scannet_benchmark: scannet200
  score_threshold: 0.1
  mask_threshold: 0.5
  min_points_per_proposal: 30
