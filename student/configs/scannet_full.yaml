experiment:
  name: full_scannet
  seed: 42
  output_root: /scratch2/nedela/student_runs

data:
  scans_root: /scratch2/nedela/chorus_poc/scans
  train_split: configs/splits/scannet_full_train.txt
  val_split: configs/splits/scannet_full_val.txt
  granularities: [0.2, 0.5, 0.8]
  use_colors: true
  append_xyz_to_features: false
  min_instance_points: 10
  preload: true
  max_points: 130000

model:
  backbone:
    name: litept
    litept_root: /home/nedela/projects/LitePT
    litept_variant: litept_s_star
    in_channels: 3
    grid_size: 0.02
    multi_scale: true                       # CHANGED
    multi_scale_indices: [0, 1, 2, 3]       # ADDED (Matches your Phase 6 architecture plan)
  num_queries: 200
  num_queries_by_granularity:
    g02: 300
    g05: 200
    g08: 100
  decoder_hidden_dim: 256
  num_decoder_layers: 4
  num_decoder_heads: 8
  query_init: hybrid
  use_positional_guidance: true
  learned_query_ratio: 0.25

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  score_weight: 0.5
  aux_weight: 0.2

train:
  device: cuda:0
  lr: 3.0e-4
  # No backbone_lr_scale — both backbone and decoder are trained from scratch
  # (no pretrained LitePT weights). Uniform LR for all parameters.
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  max_epochs: 1000
  eval_every_epochs: 5
  save_every_epochs: 10
  log_every_steps: 1
  warmup_epochs: 20

eval:
  scannet_benchmark: all
  score_threshold: 0.1
  mask_threshold: 0.5
  min_points_per_proposal: 30