# 40-epoch V2 stability sanity run.
# Purpose: check gradients, proposal/score diagnostics, scale weights, local gates,
# and bounded anchor refinement before launching full pretraining.

experiment:
  name: scannet_full_continuous_v2_sanity
  seed: 42
  output_root: ${CHORUS_OUTPUT_ROOT:-/scratch2/nedela/student_runs}

data:
  scans_root: ${SCANNET_SCANS_ROOT:-/scratch2/nedela/chorus_poc/scans}
  train_split: configs/splits/scannet_full_train.txt
  val_split: configs/splits/scannet_full_val.txt
  granularities: [0.2, 0.5, 0.8]
  use_colors: true
  use_normals: true
  append_xyz_to_features: true
  min_instance_points: 10
  preload: false
  max_points: 60000
  subsampling_mode: sphere_crop
  augmentations: true
  dense_instance_ids: false

model:
  decoder_type: continuous_v2
  allow_partial_decoder_load: false
  backbone:
    name: litept
    litept_root: ${LITEPT_ROOT:-/home/nedela/projects/LitePT}
    litept_variant: litept_s_star
    in_channels: 9
    grid_size: 0.02
    multi_scale: true
    multi_scale_indices: [0, 1, 2, 3]
  num_queries: 250
  decoder_hidden_dim: 256
  num_decoder_layers: 4
  num_decoder_heads: 8
  query_init: geometry_saliency_hybrid
  use_positional_guidance: true
  learned_query_ratio: 0.25

  continuous_decoder_v2:
    granularity:
      embed_dim: 256
      film: true
      film_targets: [query, memory, mask_head, score_head]
      scale_selector: true
      use_scale_selector: true
      scale_selector_temperature: 1.0
      scale_selector_prior_strength: 0.0
      scale_selector_prior_only: false
      freeze_scale_selector: false

    query_init:
      geometry_ratio: 0.40
      saliency_ratio: 0.35
      learned_ratio: 0.25
      fps_mode: grid_fps
      saliency_hidden_dim: 128
      spatial_nms_radius_min: 0.10
      spatial_nms_radius_max: 0.80

    anchors:
      enabled: true
      use_delta_refinement: true
      delta_scale: 0.05
      delta_norm_max: 0.50
      delta_max_norm: 0.50
      delta_max_step: 0.03
      clamp_to_scene_bounds: true
      center_loss: true

    head:
      use_film_heads: true
      logit_scale_init: 5.0
      logit_scale_min: 1.0
      logit_scale_max: 10.0
      freeze_logit_scale: true

    local_aggregation:
      enabled: true
      use_local_aggregation: true
      gate_init_prob: 0.10
      source: sparse_tokens
      radius_min: 0.15
      radius_max: 1.20
      max_neighbors: 32
      chunk_queries: 64

    relation_self_attention:
      enabled: true
      use_relation_bias: true
      geometry_bias_hidden_dim: 64
      include_radius: true
      include_granularity: true

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  score_weight: 0.5
  aux_weight: 0.2
  score_target_mode: iou
  score_loss_balance_mode: pos_neg_balanced
  score_pos_weight: 1.0
  score_neg_weight: 0.5
  score_unmatched_target_mode: soft_iou
  score_unmatched_iou_weight: 0.25
  score_unmatched_iou_cap: 0.25
  granularity_weights:
    g02: 0.207
    g05: 0.368
    g08: 0.425

  continuous_v2:
    center_weight: 0.05
    competition:
      enabled: false
      weight: 0.05
      margin: 0.10
      duplicate_iou_threshold: 0.25
    cross_granularity:
      enabled: false
      every_n_steps: 8
      granularities: [g02, g05, g08]
      containment_weight: 0.05
      union_weight: 0.05
      embedding_weight: 0.02
      overlap_threshold: 0.50
    denoising:
      enabled: false
      num_groups: 2
      noise_xyz_std_min: 0.03
      noise_xyz_std_max: 0.20
      feature_noise_std: 0.10
      weight: 0.20

train:
  device: cuda
  lr: 2.0e-5
  backbone_lr_scale: 0.1
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  max_epochs: 40
  eval_every_epochs: 20
  save_every_epochs: 20
  log_every_steps: 50
  warmup_epochs: 20
  delta_disable_epochs: 50
  anchor_refinement_warmup_epochs: 20
  anchor_refinement_warmup_start_scale: 0.0
  num_workers: 2
  batch_scenes_per_step: 2
  balance_train_by_points: true
  drop_last_train: false
  sync_step_metrics: false
  log_scene_ids: false
  profile_train_steps: false
  profile_every_steps: 10
  max_total_points_per_batch: null
  batch_assembly_policy: sequential
  decoder_loss_mode: scene_local

eval:
  scannet_benchmark: all
  scannet_benchmarks: ["scannet20", "scannet200"]
  score_threshold: 0.0
  score_thresholds_by_granularity: null
  mask_threshold: 0.5
  min_points_per_proposal: 30
  fragment_merge_eval: false
