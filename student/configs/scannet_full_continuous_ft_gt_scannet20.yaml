# Prompt finetune: continuous decoder, weights-only init, real ScanNet GT
# instance segmentation filtered to the ScanNet20 benchmark label set.
#
# This trains one real-GT target definition with a learnable granularity prompt
# g_FT, instead of forcing g02/g05/g08 to all mean ScanNet20 objects.
#
# Pretraining note: the scannet_full_continuous source checkpoint was only trained
# for 40 epochs (not the full max_epochs in the pretrain YAML).
#
# Launch (DDP 4 GPUs, from student/):
#   torchrun --standalone --nnodes=1 --nproc_per_node=4 scripts/run_multi_scene.py \
#     --config configs/scannet_full_continuous_ft_gt_scannet20.yaml \
#     --finetune-from /cluster/work/igp_psr/nedela/student_runs/scannet_full_continuous/checkpoints/best.pt
#
# Cluster:
#   sbatch --export=ALL,CONFIG_PATH=/cluster/home/nedela/nedela/projects/chorus/student/configs/scannet_full_continuous_ft_gt_scannet20.yaml,FINETUNE_FROM=/cluster/work/igp_psr/nedela/student_runs/scannet_full_continuous/checkpoints/best.pt \
#     /cluster/home/nedela/nedela/projects/chorus/student/scripts/run_multi_scene_continuous_ft_gt.sbatch

experiment:
  name: scannet_full_continuous_prompt_ft_gt_scannet20
  seed: 42
  output_root: ${CHORUS_OUTPUT_ROOT:-/scratch2/nedela/student_runs}

data:
  scans_root: ${SCANNET_SCANS_ROOT:-/scratch2/nedela/chorus_poc/scans}
  train_split: configs/splits/scannet_full_train.txt
  val_split: configs/splits/scannet_full_val.txt
  # Single prompt-finetune target key. The labels are real ScanNet20 objects;
  # g_FT is initialized near this pretrained object scale and learned.
  granularities: [0.5]
  use_colors: true
  use_normals: true
  append_xyz_to_features: true
  min_instance_points: 10
  preload: false
  max_points: 60000
  subsampling_mode: sphere_crop
  augmentations: true
  dense_instance_ids: false
  label_source: scannet_gt

model:
  decoder_type: continuous
  backbone:
    name: litept
    litept_root: ${LITEPT_ROOT:-/home/nedela/projects/LitePT}
    litept_variant: litept_s_star
    in_channels: 9
    grid_size: 0.02
    multi_scale: true
    multi_scale_indices: [0, 1, 2, 3]
  num_queries: 250
  decoder_hidden_dim: 256
  num_decoder_layers: 4
  num_decoder_heads: 8
  query_init: hybrid
  use_positional_guidance: true
  learned_query_ratio: 0.25

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  score_weight: 0.5
  aux_weight: 0.2
  granularity_weights:
    g02: 0.207
    g05: 0.368
    g08: 0.425

train:
  device: cuda
  lr: 1.0e-4
  backbone_lr_scale: 0.01
  weight_decay: 1.0e-5
  grad_clip_norm: 1.0
  max_epochs: 200
  eval_every_epochs: 10
  save_every_epochs: 10
  log_every_steps: 50
  warmup_epochs: 15
  prompt_finetune:
    enabled: true
    init_g: 0.5
    backbone_lr_scale: 0.01
  num_workers: 2
  batch_scenes_per_step: 2
  balance_train_by_points: true
  drop_last_train: false
  sync_step_metrics: false
  log_scene_ids: false
  profile_train_steps: false
  profile_every_steps: 10
  max_total_points_per_batch: null
  batch_assembly_policy: sequential
  decoder_loss_mode: scene_local

eval:
  scannet_benchmark: scannet20
  scannet_benchmarks: ["scannet20"]
  score_threshold: 0.01
  mask_threshold: 0.5
  min_points_per_proposal: 30
  fragment_merge_eval: false
