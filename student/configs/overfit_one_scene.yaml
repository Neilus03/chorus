experiment:
  name: overfit_one_scene
  seed: 42
  output_root: /scratch2/nedela/student_runs

data:
  scene_dir: /scratch2/nedela/chorus_poc/scans/scene0000_00
  granularities: [0.2, 0.5, 0.8]
  use_colors: true
  append_xyz_to_features: false
  min_instance_points: 10

model:
  backbone:
    name: litept
    litept_root: /home/nedela/projects/LitePT
    # litept_s_star = deeper decoder (insseg-litept-small-v1m2); litept_s = shallow (semseg v1m1)
    litept_variant: litept_s_star
    in_channels: 3
    grid_size: 0.02
    # multi-scale decoder feature capture (coarse→fine cross-attention).
    # Each student trunk layer attends to a different LitePT decoder scale.
    # Requires litept_s_star for meaningful per-scale features.
    multi_scale: true
    num_queries: 200
    num_queries_by_granularity:
      g02: 350
      g05: 200
      g08: 150
  decoder_hidden_dim: 256
  num_decoder_layers: 3
  num_decoder_heads: 8
  query_init: learned
  use_positional_guidance: true
  learned_query_ratio: 0.5

loss:
  bce_weight: 1.0
  dice_weight: 1.0
  score_weight: 0.5
  aux_weight: 0.2
  # Per-head loss multipliers (optional, defaults to 1.0 each).
  # granularity_weights:
  #   g02: 1.0
  #   g05: 1.0
  #   g08: 1.0

train:
  device: cuda:0
  lr: 5.0e-4
  backbone_lr_scale: 0.75
  weight_decay: 1.0e-4
  max_steps: 5000
  grad_clip_norm: 2.0
  log_every: 20
  eval_every: 100
  save_every: 200

eval:
  scannet_benchmark: scannet200
  score_threshold: 0.3
  mask_threshold: 0.5
  min_points_per_proposal: 30
  save_ply: true
  save_oracle_upper_bound: true
